name: Build, Package, and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for the release (e.g., v1.0.0)"
        required: true
        default: "v0.0.0"

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../ronet-${{ github.event.inputs.release_tag }}.zip .

      - name: Get previous release tag
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV
          echo "Previous tag: $PREV_TAG"

      - name: Generate changelog
        run: |
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            COMPARE_URL=""
          else
            RANGE="$PREV_TAG..HEAD"
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.event.inputs.release_tag }}"
          fi

          echo "Generating changelog for range: $RANGE"

          {
            echo "# Release ${{ github.event.inputs.release_tag }}"
            echo ""

            if [ -n "$PREV_TAG" ]; then
              echo "**Previous release:** $PREV_TAG"
              echo ""
              echo "**Full Changelog:** $COMPARE_URL"
              echo ""
            fi

            echo "---"
            echo ""
            echo "## Commits"
            echo ""

            git log $RANGE \
              --pretty=format:"- %s (%h) — %an" \
              --no-merges

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "## Changes"
            echo ""
            echo '```'
            git diff --stat $RANGE
            echo '```'
            echo ""
            echo ""
            echo "## Detailed Commit Log"
            echo ""

            git log $RANGE \
              --pretty=format:"- %h | %ad | %an | %s" \
              --date=short

          } > changelog.txt

          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          cat changelog.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          release_name: Release ${{ github.event.inputs.release_tag }}
          body: ${{ env.CHANGELOG }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ronet-${{ github.event.inputs.release_tag }}.zip
          asset_name: ronet-${{ github.event.inputs.release_tag }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
