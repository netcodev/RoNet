name: Build, Package, and Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Determine next version
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi

          VERSION=${LAST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"

          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

          echo "Previous version: $LAST_TAG"
          echo "New version: $NEW_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Package extension
        run: |
          cd dist
          zip -r ../ronet-${{ env.NEW_TAG }}.zip .

      - name: Generate changelog
        run: |
          RANGE="${{ env.LAST_TAG }}..HEAD"
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${{ env.LAST_TAG }}...${{ env.NEW_TAG }}"

          {
            echo "# Release ${{ env.NEW_TAG }}"
            echo ""
            echo "Previous release: ${{ env.LAST_TAG }}"
            echo ""
            echo "Full Changelog:"
            echo "$COMPARE_URL"
            echo ""

            echo "---"
            echo ""
            echo "## Commits"
            echo ""

            git log $RANGE \
              --pretty=format:"- %s (%h) - %an" \
              --no-merges

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "## Changes"
            echo ""
            echo '```'
            git diff --stat $RANGE
            echo '```'
            echo ""
            echo ""
            echo "## Detailed Commit Log"
            echo ""

            git log $RANGE \
              --pretty=format:"- %h | %ad | %an | %s" \
              --date=short

          } > changelog.txt

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          release_name: Release ${{ env.NEW_TAG }}
          body_path: changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./ronet-${{ env.NEW_TAG }}.zip
          asset_name: ronet-${{ env.NEW_TAG }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
