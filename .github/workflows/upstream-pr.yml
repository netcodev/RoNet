name: Update from RoValra

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream
      run: |
        git remote remove upstream || true
        git remote add upstream https://github.com/NotValra/RoValra.git
        git fetch upstream main

    - name: Create/update branch from main
      run: git checkout -B upstream-update main

    - name: Merge upstream changes (excluding workflows)
      run: |
        git merge upstream/main --allow-unrelated-histories -X theirs --no-commit || true
        git reset HEAD .github/workflows/*.yml
        git checkout -- .github/workflows/*.yml || true
        git add -A
        git commit -m "Merge updates from RoValra (excluding workflows)" || echo "No changes to commit"

    - name: Push branch
      run: git push origin upstream-update --force

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: upstream-update
        base: main
        title: "Updates from RoValra"
        body: "This PR merges the latest changes from the original RoValra repository (workflow files ignored)."
        labels: "upstream"
        delete-branch: false
        merge-method: squash
