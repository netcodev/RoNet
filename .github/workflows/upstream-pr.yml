name: Sync from RoValra

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout your repo
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream and fetch
      run: |
        git remote remove upstream || true
        git remote add upstream https://github.com/NotValra/RoValra.git
        git fetch upstream main

    - name: Create PR branch from main
      run: git checkout -B upstream-update main

    - name: Sync upstream files (exclude workflows)
      run: |
        git checkout upstream/main -- .
        git reset HEAD .github/workflows/*.yml
        git checkout -- .github/workflows/*.yml || true
        git add -A
        git commit -m "Sync updates from RoValra (excluding workflows)" || echo "No upstream changes"

    - name: Push PR branch
      run: git push origin upstream-update --force

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: upstream-update
        base: main
        title: "Sync updates from RoValra"
        body: "This PR includes all updates from the original RoValra repository. You can review changes, restored files, and updates before merging."
        labels: "upstream"
        delete-branch: false
        merge-method: squash
